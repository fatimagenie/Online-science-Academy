<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Online Science Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .login-wrapper {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-alt);
    }
    .login-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-card h2 {
      font-family: var(--heading-font);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }
    .login-card p {
      color: var(--text-light);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .login-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(0,51,102,0.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 24px;
    }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: var(--body-font);
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .login-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--primary-dark);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--heading-font);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:hover {
      opacity: 0.9;
    }
    .login-error {
      background: #ffdad6;
      color: #93000a;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show {
      display: block;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">Online <span>Science Academy</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="login.html" class="btn btn-primary btn-sm">Login</a>
      </div>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-icon">&#128274;</div>
      <h2>Dashboard Login</h2>
      <p>Enter your password to access the dashboard.</p>

      <div class="login-error" id="errorMsg">Incorrect password. Please try again.</div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <input type="password" id="password" class="login-input" placeholder="Enter password" autofocus>
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var password = document.getElementById('password').value;
      var errorMsg = document.getElementById('errorMsg');

      if (password === 'Admin098') {
        sessionStorage.setItem('dashboardAuth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
      return false;
    }
  </script>

</body>
</html>
